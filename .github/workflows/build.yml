# Build the Fabric mod on every push and pull request, then publish the
# remapped mod jar as a GitHub Actions artifact so it can be downloaded and
# dropped directly into a Minecraft mods folder.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build remapped mod jar
        run: ./gradlew build

      - name: upload playable mod jar
        uses: actions/upload-artifact@v4
        with:
          name: bypass-fabric-check-mod-jar
          if-no-files-found: error
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
